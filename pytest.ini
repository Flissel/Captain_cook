[pytest]
testpaths = tests
addopts =
    -m "not live and not legacy"
    --cov=agenten
    --cov=blockchain
    --cov=gateway
    --cov-report=term-missing
    --cov-fail-under=70
markers =
    live: requires real local or external services and never skips when selected
    legacy: retired compatibility behavior selected only by explicit migration gates
