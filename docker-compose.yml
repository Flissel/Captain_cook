services:
  mailpit:
    image: axllent/mailpit:v1.29.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILPIT_WEB_PORT:-8025}:8025"
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

  mariadb:
    image: mariadb:11.8.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "${MARIADB_DATABASE:-captain_ledger}"
      MARIADB_USER: "${MARIADB_USER:-captain}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD:?MARIADB_PASSWORD fehlt}"
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD fehlt}"
      TZ: "${CAPTAIN_TIMEZONE:-Europe/Berlin}"
    ports:
      - "127.0.0.1:${MARIADB_PORT:-3306}:3306"
    volumes:
      - ledger_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  n8n:
    image: n8nio/n8n:2.29.10
    profiles: ["owned-n8n"]
    restart: unless-stopped
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: "${CAPTAIN_TIMEZONE:-Europe/Berlin}"
      TZ: "${CAPTAIN_TIMEZONE:-Europe/Berlin}"
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  ledger_data:
  n8n_data:
