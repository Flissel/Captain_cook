name: captain-cook

services:
  mailpit:
    image: axllent/mailpit:v1.29.6
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    environment:
      TZ: "${GENERIC_TIMEZONE:-Europe/Berlin}"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  mariadb:
    image: mariadb:11.8.8
    restart: unless-stopped
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    environment:
      MARIADB_DATABASE: "${MARIADB_DATABASE:-ledger}"
      MARIADB_USER: "${MARIADB_USER:-captain}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD:?Set MARIADB_PASSWORD in .env}"
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD in .env}"
      TZ: "${GENERIC_TIMEZONE:-Europe/Berlin}"
    volumes:
      - ledger_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  ledger_data:
